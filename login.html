{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-building" style="font-size: 4rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    <h3 class="mt-3 fw-bold">SyndicPro</h3>
                    <p class="text-muted">Gestion de Syndic Professionnelle</p>
                </div>
                
                <form method="post">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-envelope"></i> Email
                        </label>
                        <input class="form-control form-control-lg" name="email" 
                               type="email" placeholder="votre@email.com" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock"></i> Mot de passe
                        </label>
                        <input class="form-control form-control-lg" name="password" 
                               type="password" placeholder="••••••••" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Se Connecter
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="alert alert-info mb-0">
                    <h6 class="alert-heading">
                        <i class="bi bi-info-circle"></i> Comptes de Démonstration
                    </h6>
                    <ul class="mb-0 small">
                        <li><strong>Administrateur :</strong> admin@example.com / admin123</li>
                        <li><strong>Résident :</strong> resident@example.com / resident123</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="text-white">
                <i class="bi bi-shield-check"></i> Connexion sécurisée
            </p>
        </div>
    </div>
</div>

<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container {
        margin-top: -50px;
    }
</style>
{% endblock %}
